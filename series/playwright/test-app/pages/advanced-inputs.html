<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Inputs — Test Components</title>
    <link rel="stylesheet" href="/assets/style.css" />
</head>

<body>
    <nav class="topbar">
        <a href="/" data-testid="back-home">← Home</a>
        <span>Advanced Inputs (Lessons 31–40)</span>
    </nav>
    <main class="container">

        <section class="section">
            <h2>Date &amp; Time Pickers</h2>
            <div class="form-group">
                <label class="label" for="date-input">Date</label>
                <input id="date-input" data-testid="input-date" type="date" class="input" min="2024-01-01"
                    max="2030-12-31" />
            </div>
            <div class="form-group">
                <label class="label" for="time-input">Time</label>
                <input id="time-input" data-testid="input-time" type="time" class="input" />
            </div>
            <div class="form-group">
                <label class="label" for="datetime-input">Date &amp; Time</label>
                <input id="datetime-input" data-testid="input-datetime" type="datetime-local" class="input" />
            </div>
            <p data-testid="date-result" class="result"></p>
        </section>

        <section class="section">
            <h2>Range Slider</h2>
            <div class="form-group">
                <label class="label">Volume: <span data-testid="slider-value">50</span>%</label>
                <input data-testid="input-range" type="range" min="0" max="100" value="50"
                    style="width:100%;margin:.5rem 0" />
            </div>
            <div class="form-group">
                <label class="label">Color</label>
                <input data-testid="input-color" type="color" value="#4f46e5"
                    style="width:60px;height:40px;border:none;cursor:pointer" />
                <span data-testid="color-value" style="margin-left:.5rem">#4f46e5</span>
            </div>
        </section>

        <section class="section">
            <h2>File Upload</h2>
            <div class="form-group">
                <label class="label" for="file-single">Single File</label>
                <input id="file-single" data-testid="input-file-single" type="file" class="input"
                    accept=".jpg,.png,.pdf" />
                <p data-testid="file-single-result" class="result"></p>
            </div>
            <div class="form-group">
                <label class="label" for="file-multiple">Multiple Files</label>
                <input id="file-multiple" data-testid="input-file-multiple" type="file" class="input" multiple />
                <p data-testid="file-multiple-result" class="result"></p>
            </div>
        </section>

        <section class="section">
            <h2>OTP / PIN Input</h2>
            <div style="display:flex;gap:.5rem" data-testid="otp-container">
                <input data-testid="otp-0" type="text" maxlength="1" class="input"
                    style="width:3rem;text-align:center;font-size:1.5rem" inputmode="numeric" />
                <input data-testid="otp-1" type="text" maxlength="1" class="input"
                    style="width:3rem;text-align:center;font-size:1.5rem" inputmode="numeric" />
                <input data-testid="otp-2" type="text" maxlength="1" class="input"
                    style="width:3rem;text-align:center;font-size:1.5rem" inputmode="numeric" />
                <input data-testid="otp-3" type="text" maxlength="1" class="input"
                    style="width:3rem;text-align:center;font-size:1.5rem" inputmode="numeric" />
                <input data-testid="otp-4" type="text" maxlength="1" class="input"
                    style="width:3rem;text-align:center;font-size:1.5rem" inputmode="numeric" />
                <input data-testid="otp-5" type="text" maxlength="1" class="input"
                    style="width:3rem;text-align:center;font-size:1.5rem" inputmode="numeric" />
            </div>
            <p data-testid="otp-result" class="result" style="margin-top:.75rem"></p>
        </section>

        <section class="section">
            <h2>Star Rating</h2>
            <div data-testid="rating-container" style="display:flex;gap:.25rem;font-size:2rem" role="group"
                aria-label="Star rating">
                <button data-testid="star-1" aria-label="Rate 1 star"
                    style="background:none;border:none;cursor:pointer">⭐</button>
                <button data-testid="star-2" aria-label="Rate 2 stars"
                    style="background:none;border:none;cursor:pointer">⭐</button>
                <button data-testid="star-3" aria-label="Rate 3 stars"
                    style="background:none;border:none;cursor:pointer">⭐</button>
                <button data-testid="star-4" aria-label="Rate 4 stars"
                    style="background:none;border:none;cursor:pointer">⭐</button>
                <button data-testid="star-5" aria-label="Rate 5 stars"
                    style="background:none;border:none;cursor:pointer">⭐</button>
            </div>
            <p data-testid="rating-result" class="result" style="margin-top:.75rem">No rating selected</p>
        </section>

    </main>
    <script>
        // Slider
        const slider = document.querySelector('[data-testid="input-range"]');
        slider.addEventListener('input', () => {
            document.querySelector('[data-testid="slider-value"]').textContent = slider.value;
        });
        // Color
        const color = document.querySelector('[data-testid="input-color"]');
        color.addEventListener('input', () => {
            document.querySelector('[data-testid="color-value"]').textContent = color.value;
        });
        // Date
        ['input-date', 'input-time', 'input-datetime'].forEach(id => {
            document.querySelector(`[data-testid="${id}"]`).addEventListener('change', e => {
                document.querySelector('[data-testid="date-result"]').textContent = `Selected: ${e.target.value}`;
            });
        });
        // Files
        document.querySelector('[data-testid="input-file-single"]').addEventListener('change', e => {
            document.querySelector('[data-testid="file-single-result"]').textContent =
                e.target.files[0] ? `File: ${e.target.files[0].name}` : '';
        });
        document.querySelector('[data-testid="input-file-multiple"]').addEventListener('change', e => {
            document.querySelector('[data-testid="file-multiple-result"]').textContent =
                `${e.target.files.length} file(s) selected`;
        });
        // OTP auto-advance
        const otps = document.querySelectorAll('[data-testid^="otp-"]');
        otps.forEach((el, i) => {
            el.addEventListener('input', () => {
                if (el.value && i < otps.length - 1) otps[i + 1].focus();
                const code = [...otps].map(o => o.value).join('');
                if (code.length === 6) document.querySelector('[data-testid="otp-result"]').textContent = `OTP: ${code}`;
            });
        });
        // Rating
        let curRating = 0;
        const stars = document.querySelectorAll('[data-testid^="star-"]');
        stars.forEach((star, i) => {
            star.addEventListener('click', () => {
                curRating = i + 1;
                stars.forEach((s, j) => s.textContent = j < curRating ? '🌟' : '⭐');
                document.querySelector('[data-testid="rating-result"]').textContent = `Rating: ${curRating}/5`;
            });
        });
    </script>
</body>

</html>
