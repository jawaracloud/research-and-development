version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Chaos Engineering Series — Local Lab
# Starts: target app, Prometheus, Grafana, Toxiproxy
# LitmusChaos and Chaos Mesh are installed INTO a kind cluster (see scripts/).
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Sample Go HTTP target app ─────────────────────────────────────────────
  target-app:
    image: golang:1.23-alpine
    working_dir: /app
    volumes:
      - ./target-app:/app
    command: go run main.go
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - chaos-net

  # ── Toxiproxy — network fault injection proxy ─────────────────────────────
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.10.0
    ports:
      - "8474:8474"   # Toxiproxy API
      - "5432:5432"   # Proxied postgres
    networks:
      - chaos-net

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - chaos-net

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: chaos123
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - chaos-net

  # ── PostgreSQL — database target for chaos ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaosdb
      POSTGRES_USER: chaos
      POSTGRES_PASSWORD: chaos123
    ports:
      - "5433:5432"   # direct (bypassing Toxiproxy)
    networks:
      - chaos-net

volumes:
  grafana-data:

networks:
  chaos-net:
    driver: bridge
