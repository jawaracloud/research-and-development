version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# NATS Series — Local Development Lab
# Starts: 3-node NATS JetStream cluster, Prometheus, Grafana, NATS Surveyor,
#         PostgreSQL (for pattern examples), Redis (for pattern examples)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── NATS Cluster Node 1 ───────────────────────────────────────────────────
  nats-1:
    image: nats:2.10-alpine
    command: >
      -n nats-1
      -cluster nats://0.0.0.0:6222
      -routes nats://nats-2:6222,nats://nats-3:6222
      -js
      -sd /data
      -m 8222
      -p 4222
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats-1-data:/data
    networks:
      - nats-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── NATS Cluster Node 2 ───────────────────────────────────────────────────
  nats-2:
    image: nats:2.10-alpine
    command: >
      -n nats-2
      -cluster nats://0.0.0.0:6222
      -routes nats://nats-1:6222,nats://nats-3:6222
      -js
      -sd /data
      -m 8223
    ports:
      - "4223:4222"
      - "8223:8223"
    volumes:
      - nats-2-data:/data
    networks:
      - nats-net

  # ── NATS Cluster Node 3 ───────────────────────────────────────────────────
  nats-3:
    image: nats:2.10-alpine
    command: >
      -n nats-3
      -cluster nats://0.0.0.0:6222
      -routes nats://nats-1:6222,nats://nats-2:6222
      -js
      -sd /data
      -m 8224
    ports:
      - "4224:4222"
      - "8224:8224"
    volumes:
      - nats-3-data:/data
    networks:
      - nats-net

  # ── NATS Surveyor (Prometheus exporter) ──────────────────────────────────
  nats-surveyor:
    image: natsio/nats-surveyor:latest
    command: >
      -s nats://nats-1:4222,nats://nats-2:4222,nats://nats-3:4222
      --port 7777
    ports:
      - "7777:7777"
    depends_on:
      nats-1:
        condition: service_healthy
    networks:
      - nats-net

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - nats-net

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: nats123
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - nats-net

  # ── PostgreSQL (used in pattern examples) ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: natsdb
      POSTGRES_USER: nats
      POSTGRES_PASSWORD: nats123
    ports:
      - "5432:5432"
    networks:
      - nats-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nats -d natsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (used in pattern examples) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - nats-net

volumes:
  nats-1-data:
  nats-2-data:
  nats-3-data:
  grafana-data:

networks:
  nats-net:
    driver: bridge
